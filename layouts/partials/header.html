<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>{{ .Title }}</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	{{ if .Description }}
		<meta name="description" content="{{ .Description }}">
	{{ end }}
	{{ with site.Params.author }}
		<meta name="author" content="{{ . }}">
	{{ end }}
	{{ hugo.Generator }}
	<script>(function(){var s=localStorage.getItem('theme')||'auto';var t=s==='auto'?(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'):s;document.documentElement.setAttribute('data-theme',t);document.documentElement.setAttribute('data-theme-pref',s);}());</script>
	{{ partial "stylesheets.html" . }}
	{{ if .Params.math }}
		{{ partial "math.html" }}
	{{ end }}
</head>
<body>
<div class="pure-g">
  <div class="pure-u-1" id="header">
    <a href="{{ site.BaseURL }}">{{ site.Title }}</a>
    {{ range site.Menus.top }}
      <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
    <span id="theme-control">
      <button data-value="dark"  onclick="setThemePref('dark')">Dark</button>
      <button data-value="auto"  onclick="setThemePref('auto')">Auto</button>
      <button data-value="light" onclick="setThemePref('light')">Light</button>
    </span>
  </div>
</div>
<script>function setThemePref(p){var t=p==='auto'?(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'):p;document.documentElement.setAttribute('data-theme',t);document.documentElement.setAttribute('data-theme-pref',p);localStorage.setItem('theme',p);}</script>
