<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>{{ .Title }}</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	{{ if .Description }}
		<meta name="description" content="{{ .Description }}">
	{{ end }}
	{{ if site.Author.name }}
		<meta name="author" content="{{ site.Author.name }}">
	{{ end }}
	{{ hugo.Generator }}
	<script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);}());</script>
	{{ partial "stylesheets.html" . }}
	{{ if .Params.math }}
		{{ partial "math.html" }}
	{{ end }}
</head>
<body>
<div class="pure-g">
  <div class="pure-u-1" id="header">
    <a href="{{ site.BaseURL }}">{{ site.Title }}</a>
    {{ range site.Menus.top }}
      <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
    <a href="#" id="theme-toggle" onclick="var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('theme',n);this.textContent=n==='dark'?'light mode':'dark mode';return false;">dark mode</a>
  </div>
</div>
<script>(function(){var t=document.documentElement.getAttribute('data-theme');document.getElementById('theme-toggle').textContent=t==='dark'?'light mode':'dark mode';}());</script>
